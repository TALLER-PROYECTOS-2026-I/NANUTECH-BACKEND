name: Deploy to AWS (Testing)

on:
  pull_request:
    types: [closed]
    branches:
      - testing

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: 🚀 Deploy to AWS - Testing
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: testing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install AWS SAM CLI
        run: pip install aws-sam-cli

      - name: Build SAM application
        run: sam build

      - name: Delete old Stage triggers (Fix for duplicate stage issue)
        run: |
          echo "🗑️ Eliminando triggers viejos del stage 'Stage'..."
          REST_API_ID="f6lrwole81"
          
          # Obtener los triggers actuales de la Lambda
          CURRENT_POLICY=$(aws lambda get-policy --function-name testing-auth --region us-east-1 2>/dev/null || echo "{}")
          
          # Si existen triggers con "Stage", forzar actualización eliminando la política
          if echo "$CURRENT_POLICY" | grep -q "/Stage/"; then
            echo "⚠️ Detectados triggers con stage 'Stage', forzando limpieza..."
            # No podemos eliminar triggers individuales fácilmente, así que forzamos recreación
            touch .aws-sam/force-update-triggers
          else
            echo "✅ No se detectaron triggers con stage 'Stage'"
          fi

      - name: Deploy SAM application (Forced Update)
        run: |
          # Generar timestamp único para forzar actualización
          FORCE_UPDATE=$(date +%s)
          
          echo "🚀 Desplegando con ForceUpdate=${FORCE_UPDATE}"
          
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name nanutech-backend-testing \
            --capabilities CAPABILITY_IAM \
            --region us-east-1 \
            --resolve-s3 \
            --parameter-overrides \
              StageName=testing \
              DBHost=${{ secrets.DB_HOST }} \
              DBName=${{ secrets.DB_NAME }} \
              DBUser=${{ secrets.DB_USER }} \
              DBPassword=${{ secrets.DB_PASSWORD }} \
              DBPort=${{ secrets.DB_PORT }} \
              DBSslEnabled=${{ secrets.DB_SSL_ENABLED || 'true' }} \
              AuthProvider=${{ secrets.AUTH_PROVIDER || 'local' }} \
              CognitoUserPoolId=${{ secrets.COGNITO_USER_POOL_ID || '' }} \
              CognitoClientId=${{ secrets.COGNITO_CLIENT_ID || '' }} \
              SessionTimeoutSeconds=${{ secrets.SESSION_TIMEOUT_SECONDS || '7200' }} \
              AuthTokenSecret=${{ secrets.AUTH_TOKEN_SECRET || 'nanutech-local-auth-secret' }} \
              PrivateSubnets=${{ secrets.PRIVATE_SUBNETS || secrets.SUBNET_IDS }} \
              LambdaSecurityGroup=${{ secrets.LAMBDA_SECURITY_GROUP || secrets.LAMBDA_SG_ID }} \
              ForceUpdate=${FORCE_UPDATE}

      - name: Verify API Gateway stages
        run: |
          echo "🔍 Verificando stages desplegados..."
          REST_API_ID="f6lrwole81"
          
          # Listar stages
          aws apigateway get-stages --rest-api-id ${REST_API_ID} --region us-east-1
          
          # Verificar que el stage 'testing' existe
          STAGES=$(aws apigateway get-stages --rest-api-id ${REST_API_ID} --region us-east-1 --query 'item[].stageName' --output text)
          
          if echo "$STAGES" | grep -q "testing"; then
            echo "✅ Stage 'testing' encontrado"
          else
            echo "❌ Stage 'testing' NO encontrado"
            exit 1
          fi
          
          # Si existe stage 'Stage', mostrar advertencia
          if echo "$STAGES" | grep -q "Stage"; then
            echo "⚠️ ADVERTENCIA: El stage 'Stage' todavía existe"
            echo "   Puedes eliminarlo manualmente con:"
            echo "   aws apigateway delete-stage --rest-api-id ${REST_API_ID} --stage-name Stage --region us-east-1"
          fi

      - name: Update Lambda triggers to correct stage
        run: |
          echo "🔄 Actualizando triggers de Lambda al stage correcto..."
          REST_API_ID="f6lrwole81"
          FUNCTION_NAME="testing-auth"
          
          # Obtener la política actual
          CURRENT_POLICY=$(aws lambda get-policy --function-name ${FUNCTION_NAME} --region us-east-1 2>/dev/null || echo "{}")
          
          # Extraer el Statement ID de la política actual
          STATEMENT_ID=$(echo "$CURRENT_POLICY" | grep -o '"Sid":"[^"]*"' | head -1 | cut -d'"' -f4)
          
          # Si hay una política con stage incorrecto, eliminarla
          if echo "$CURRENT_POLICY" | grep -q "/Stage/"; then
            echo "⚠️ Eliminando política vieja con stage 'Stage'..."
            aws lambda remove-permission \
              --function-name ${FUNCTION_NAME} \
              --statement-id ${STATEMENT_ID} \
              --region us-east-1 2>/dev/null || true
            
            # Forzar recreación en el próximo deploy
            echo "✅ Política vieja eliminada, los triggers se recrearán automáticamente"
          else
            echo "✅ Los triggers ya usan el stage correcto"
          fi

      - name: Final verification
        run: |
          echo "🎉 Despliegue completado!"
          echo ""
          echo "📋 Endpoints disponibles:"
          echo "   POST   https://f6lrwole81.execute-api.us-east-1.amazonaws.com/testing/auth/login"
          echo "   POST   https://f6lrwole81.execute-api.us-east-1.amazonaws.com/testing/auth/forgot-password"
          echo "   POST   https://f6lrwole81.execute-api.us-east-1.amazonaws.com/testing/auth/forgot-password/confirm"
          echo "   GET    https://f6lrwole81.execute-api.us-east-1.amazonaws.com/testing/auth/me"
          echo "   GET    https://f6lrwole81.execute-api.us-east-1.amazonaws.com/testing/camiones"
          echo "   GET    https://f6lrwole81.execute-api.us-east-1.amazonaws.com/testing/conductores"
          echo "   GET    https://f6lrwole81.execute-api.us-east-1.amazonaws.com/testing/contratos/vigentes"
          echo "   POST   https://f6lrwole81.execute-api.us-east-1.amazonaws.com/testing/jornadas"
          echo "   GET    https://f6lrwole81.execute-api.us-east-1.amazonaws.com/testing/unidades/disponibles"
          echo ""
          echo "🔧 Prueba rápida:"
          echo "   curl -X POST https://f6lrwole81.execute-api.us-east-1.amazonaws.com/testing/auth/login \\"
          echo "     -H 'Content-Type: application/json' \\"
          echo "     -d '{\"email\":\"test@test.com\",\"password\":\"123456\"}'"
