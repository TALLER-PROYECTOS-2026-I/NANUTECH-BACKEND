AWSTemplateFormatVersion: 2010-09-09
Description: API para gestión de camiones - Nanutech Backend

Transform:
  - AWS::Serverless-2016-10-31

Parameters:
  StageName:
    Type: String
    Default: dev
    Description: "dev: 'dev' | testing: 'testing' | production: ''"
  DBHost:
    Type: String
    Default: "database-demo.c56g84wquc58.us-east-2.rds.amazonaws.com"
  DBUser:
    Type: String
    Default: "backend_user"
  DBPassword:
    Type: String
    Default: "Backend123!"
    NoEcho: true
  DBName:
    Type: String
    Default: "postgres"
  DBPort:
    Type: String
    Default: "5432"
xs
Globals:
  Function:
    Timeout: 30
    MemorySize: 512
    Runtime: nodejs20.x
    Architectures:
      - x86_64
    Environment:
      Variables:
        NODE_ENV: !Ref StageName
        DB_HOST: !Ref DBHost
        DB_USER: !Ref DBUser
        DB_PASSWORD: !Ref DBPassword
        DB_NAME: !Ref DBName
        DB_PORT: !Ref DBPort
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: "1"
        NODE_OPTIONS: "--enable-source-maps"
    LoggingConfig:
      LogFormat: JSON
    Tags:
      Environment: !Ref StageName
      Proyecto: Nanuetch-Backend
    Tracing: Active

Resources:
  NanutechApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "nanutech-api-${StageName}"
      StageName: !Ref StageName
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
      TracingEnabled: true
      Tags:
        Environment: !Ref StageName
        Proyecto: Nanuetch-Backend

  CamionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${StageName}-camiones"
      CodeUri: .
      Handler: src/functions/camion-services/camionHandler.handler
      Policies:
        - AWSLambdaBasicExecutionRole
      Environment:
        Variables:
          LOG_LEVEL: "debug"
      Events:
        GetAll:
          Type: Api
          Properties:
            RestApiId: !Ref NanutechApi
            Path: /camiones
            Method: GET
        GetById:
          Type: Api
          Properties:
            RestApiId: !Ref NanutechApi
            Path: /camiones/{id}
            Method: GET
      Tags:
        Environment: !Ref StageName
        Servicio: camion
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/functions/camion-services/camionHandler.mjs

  ApplicationResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name: !Sub "ApplicationInsights-SAM-${AWS::StackName}"
      ResourceQuery:
        Type: CLOUDFORMATION_STACK_1_0

  ApplicationInsightsMonitoring:
    Type: AWS::ApplicationInsights::Application
    Properties:
      ResourceGroupName: !Ref ApplicationResourceGroup
      AutoConfigurationEnabled: true

Outputs:
  ApiEndpoint:
    Description: "URL del endpoint de API Gateway"
    Value: !Sub "https://${NanutechApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${StageName}"
  CamionFunctionArn:
    Description: "ARN de la función Camion"
    Value: !GetAtt CamionFunction.Arn
