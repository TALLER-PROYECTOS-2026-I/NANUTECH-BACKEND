name: Deploy to AWS (Testing)

on:
  pull_request:
    types: [closed]
    branches:
      - testing

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: 🚀 Deploy to AWS - Testing
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: testing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install AWS SAM CLI
        run: pip install aws-sam-cli

      - name: Build SAM application
        run: sam build

      - name: Deploy SAM application
        run: |
          FORCE_UPDATE=$(date +%s)
          
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name nanutech-backend-testing \
            --capabilities CAPABILITY_IAM \
            --region us-east-1 \
            --resolve-s3 \
            --parameter-overrides \
              StageName=testing \
              DBHost=${{ secrets.DB_HOST }} \
              DBName=${{ secrets.DB_NAME }} \
              DBUser=${{ secrets.DB_USER }} \
              DBPassword=${{ secrets.DB_PASSWORD }} \
              DBPort=${{ secrets.DB_PORT }} \
              DBSslEnabled=${{ secrets.DB_SSL_ENABLED || 'true' }} \
              AuthProvider=${{ secrets.AUTH_PROVIDER || 'cognito' }} \
              CognitoUserPoolId=${{ secrets.COGNITO_USER_POOL_ID }} \
              CognitoClientId=${{ secrets.COGNITO_CLIENT_ID }} \
              SessionTimeoutSeconds=${{ secrets.SESSION_TIMEOUT_SECONDS || '7200' }} \
              PrivateSubnets=${{ secrets.SUBNET_IDS }} \
              LambdaSecurityGroup=${{ secrets.LAMBDA_SG_ID }} \
              ForceUpdate=${FORCE_UPDATE}

      - name: Wait for stack to be ready
        run: |
          echo "⏳ Esperando 30 segundos para que el stack esté completamente listo..."
          sleep 30

      - name: Run migrations with cascade cleanup
        run: |
          echo "========================================="
          echo "📦 EJECUTANDO MIGRACIONES CON LIMPIEZA CASCADE"
          echo "========================================="
          
          # Obtener timestamp para logs
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
          echo "🕐 Iniciando migraciones: ${TIMESTAMP}"
          
          # Ejecutar migración con limpieza completa en cascada
          # clean=true: Elimina todas las tablas, tipos ENUM, funciones y triggers antes de migrar
          # Esto asegura que no haya conflictos con estructuras existentes
          echo "🧹 Limpieza en cascada habilitada - Se eliminarán todas las tablas existentes"
          
          timeout 360 aws lambda invoke \
            --function-name testing-migrator \
            --region us-east-1 \
            --cli-binary-format raw-in-base64-out \
            --payload '{"action": "migrate", "clean": true}' \
            migration-response.json
          
          # Guardar el código de salida
          EXIT_CODE=$?
          
          # Verificar si hubo timeout (código 124)
          if [ $EXIT_CODE -eq 124 ]; then
            echo "❌ Error: Las migraciones tomaron más de 6 minutos (timeout)"
            echo "🔍 Revisa los logs en CloudWatch para más detalles"
            exit 1
          fi
          
          # Verificar si hubo otro error
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Error al invocar la Lambda (código: $EXIT_CODE)"
            echo "🔍 Posibles causas:"
            echo "   - La función Lambda no existe"
            echo "   - Permisos insuficientes"
            echo "   - Problemas de VPC/conexión a la base de datos"
            exit $EXIT_CODE
          fi
          
          # Mostrar respuesta completa
          echo ""
          echo "========================================="
          echo "📋 RESPUESTA DE LA LAMBDA:"
          echo "========================================="
          cat migration-response.json
          echo ""
          echo "========================================="
          
          # Verificar si hubo error en la migración
          if grep -q '"success":false' migration-response.json; then
            echo "❌ Error: Las migraciones fallaron"
            echo ""
            echo "🔍 Para depurar:"
            echo "   1. Revisa los logs en CloudWatch:"
            echo "      aws logs describe-log-groups --log-group-name-prefix /aws/lambda/testing-migrator"
            echo "   2. Verifica la sintaxis del SQL"
            echo "   3. Comprueba las conexiones a la base de datos"
            exit 1
          fi
          
          # Extraer mensaje de éxito si existe
          if grep -q '"success":true' migration-response.json; then
            MESSAGE=$(grep -o '"message":"[^"]*"' migration-response.json | cut -d'"' -f4)
            CLEANED=$(grep -o '"cleaned":[^,}]*' migration-response.json | cut -d':' -f2)
            
            echo "✅ Migraciones completadas exitosamente"
            echo "📊 Mensaje: ${MESSAGE}"
            echo "🧹 Limpieza realizada: ${CLEANED}"
          fi
          
          echo ""
          echo "========================================="
          echo "🎉 PROCESO DE MIGRACIÓN FINALIZADO"
          echo "========================================="

      - name: Verify deployment
        run: |
          echo ""
          echo "========================================="
          echo "🔍 VERIFICANDO DEPLOYMENT"
          echo "========================================="
          
          # Obtener información del stack
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name nanutech-backend-testing \
            --region us-east-1 \
            --query 'Stacks[0].StackStatus' \
            --output text)
          
          echo "📊 Estado del stack: ${STACK_STATUS}"
          
          # Obtener API URL
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name nanutech-backend-testing \
            --region us-east-1 \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiEndpoint`].OutputValue' \
            --output text)
          
          # Obtener ARN de la función migrator
          MIGRATOR_ARN=$(aws cloudformation describe-stacks \
            --stack-name nanutech-backend-testing \
            --region us-east-1 \
            --query 'Stacks[0].Outputs[?OutputKey==`MigratorFunctionArn`].OutputValue' \
            --output text)
          
          echo ""
          echo "========================================="
          echo "✅ DEPLOYMENT COMPLETADO EXITOSAMENTE"
          echo "========================================="
          echo "🌐 API Endpoint: ${API_URL}"
          echo "🔧 Migrator Function ARN: ${MIGRATOR_ARN}"
          echo "🕐 Timestamp: $(date '+%Y-%m-%d %H:%M:%S')"
          echo ""
          echo "📝 Notas importantes:"
          echo "   - Las migraciones se ejecutaron con limpieza en cascada"
          echo "   - Todas las tablas fueron recreadas desde cero"
          echo "   - Los datos anteriores fueron eliminados"
          echo ""
          echo "🧪 Para probar la API:"
          echo "   curl ${API_URL}/camiones"
          echo "========================================="

      - name: (Opcional) Enviar notificación a Slack
        if: always()
        run: |
          # Este paso es opcional - descomentar si tienes webhook de Slack
          # WEBHOOK_URL="${{ secrets.SLACK_WEBHOOK_URL }}"
          # if [ -n "$WEBHOOK_URL" ]; then
          #   STATUS="${{ job.status }}"
          #   if [ "$STATUS" == "success" ]; then
          #     MESSAGE="✅ Despliegue exitoso a TESTING con migraciones en cascada"
          #   else
          #     MESSAGE="❌ Falló el despliegue a TESTING"
          #   fi
          #   
          #   curl -X POST -H 'Content-type: application/json' \
          #     --data "{\"text\":\"${MESSAGE}\nAPI: ${API_URL}\"}" \
          #     $WEBHOOK_URL
          # fi
          echo "ℹ️ Notificación Slack deshabilitada (configurar SLACK_WEBHOOK_URL para habilitar)"
