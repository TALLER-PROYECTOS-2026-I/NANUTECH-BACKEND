name: Deploy to AWS (Testing)

on:
  pull_request:
    types: [closed]
    branches:
      - testing

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: 🚀 Deploy to AWS - Testing
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: testing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install AWS SAM CLI
        run: pip install aws-sam-cli

      - name: Build SAM application
        run: sam build

      - name: Deploy SAM application
        run: |
          FORCE_UPDATE=$(date +%s)
          
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name nanutech-backend-testing \
            --capabilities CAPABILITY_IAM \
            --region us-east-1 \
            --resolve-s3 \
            --parameter-overrides \
              StageName=testing \
              DBHost=${{ secrets.DB_HOST }} \
              DBName=${{ secrets.DB_NAME }} \
              DBUser=${{ secrets.DB_USER }} \
              DBPassword=${{ secrets.DB_PASSWORD }} \
              DBPort=${{ secrets.DB_PORT }} \
              DBSslEnabled=${{ secrets.DB_SSL_ENABLED || 'true' }} \
              AuthProvider=${{ secrets.AUTH_PROVIDER || 'cognito' }} \
              CognitoUserPoolId=${{ secrets.COGNITO_USER_POOL_ID }} \
              CognitoClientId=${{ secrets.COGNITO_CLIENT_ID }} \
              SessionTimeoutSeconds=${{ secrets.SESSION_TIMEOUT_SECONDS || '7200' }} \
              PrivateSubnets=${{ secrets.PRIVATE_SUBNETS }} \
              LambdaSecurityGroup=${{ secrets.LAMBDA_SECURITY_GROUP }} \
              ForceUpdate=${FORCE_UPDATE}

      - name: Wait for stack to be ready
        run: |
          echo "⏳ Esperando 30 segundos para que el stack esté completamente listo..."
          sleep 30

      - name: Run migrations with timeout
        run: |
          echo "📦 Ejecutando migraciones (timeout de 6 minutos)..."
          
          # Ejecutar migración con timeout de 6 minutos (360 segundos)
          timeout 360 aws lambda invoke \
            --function-name testing-migrator \
            --region us-east-1 \
            --payload '{"action": "migrate"}' \
            migration-response.json
          
          # Verificar si hubo timeout (código 124)
          if [ $? -eq 124 ]; then
            echo "❌ Error: Las migraciones tomaron más de 6 minutos"
            exit 1
          fi
          
          # Mostrar respuesta
          echo "📋 Respuesta de la Lambda:"
          cat migration-response.json
          
          # Verificar si hubo error en la migración
          if grep -q '"success":false' migration-response.json; then
            echo "❌ Error: Las migraciones fallaron"
            exit 1
          fi
          
          echo "✅ Migraciones completadas exitosamente"

      - name: Verify deployment
        run: |
          echo "✅ Deployment completado"
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name nanutech-backend-testing \
            --region us-east-1 \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiEndpoint`].OutputValue' \
            --output text)
          
          echo "🌐 API Endpoint: ${API_URL}"
          echo "✅ Todo listo!"
