name: Deploy to AWS (Testing)

on:
  pull_request:
    types: [closed]
    branches:
      - testing

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: 🚀 Deploy to AWS - Testing
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: testing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install yaml validation tool
        run: pip install pyyaml

      - name: Validate SAM template
        run: |
          echo "🔍 Verificando template.yaml..."
          
          # Listar archivos para debug
          ls -la
          
          # Verificar existencia
          if [ ! -f "template.yaml" ]; then
            echo "❌ ERROR: No se encuentra template.yaml"
            exit 1
          fi
          
          # Validar YAML
          python3 -c "
          import yaml, sys
          try:
            with open('template.yaml', 'r') as f:
              data = yaml.safe_load(f)
              if 'Resources' not in data:
                print('ERROR: No se encuentra sección Resources')
                sys.exit(1)
              print('✅ Template válido - Resources encontrado')
          except Exception as e:
            print(f'ERROR: {e}')
            sys.exit(1)
          "

      - name: Install AWS SAM CLI
        run: pip install aws-sam-cli

      - name: Build SAM application
        run: |
          # Usar template explícito
          sam build --template-file template.yaml

      - name: Deploy SAM application
        run: |
          FORCE_UPDATE=$(date +%s)
          
          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name nanutech-backend-testing \
            --capabilities CAPABILITY_IAM \
            --region us-east-1 \
            --resolve-s3 \
            --parameter-overrides \
              StageName=testing \
              DBHost=${{ secrets.DB_HOST }} \
              DBName=${{ secrets.DB_NAME }} \
              DBUser=${{ secrets.DB_USER }} \
              DBPassword=${{ secrets.DB_PASSWORD }} \
              DBPort=${{ secrets.DB_PORT }} \
              DBSslEnabled=${{ secrets.DB_SSL_ENABLED || 'true' }} \
              AuthProvider=${{ secrets.AUTH_PROVIDER || 'local' }} \
              CognitoUserPoolId=${{ secrets.COGNITO_USER_POOL_ID || '' }} \
              CognitoClientId=${{ secrets.COGNITO_CLIENT_ID || '' }} \
              SessionTimeoutSeconds=${{ secrets.SESSION_TIMEOUT_SECONDS || '7200' }} \
              AuthTokenSecret=${{ secrets.AUTH_TOKEN_SECRET || 'nanutech-local-auth-secret' }} \
              PrivateSubnets=${{ secrets.PRIVATE_SUBNETS || secrets.SUBNET_IDS }} \
              LambdaSecurityGroup=${{ secrets.LAMBDA_SECURITY_GROUP || secrets.LAMBDA_SG_ID }} \
              ForceUpdate=${FORCE_UPDATE}
